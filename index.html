<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Taxi App</title>

<!-- Firebase COMPAT (ВАЖНО!) -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<style>
body { font-family: Arial; background:#111; color:white; text-align:center; }
button { padding:10px; margin:5px; cursor:pointer; }
input { padding:10px; margin:5px; width:80%; }
.card { background:#222; margin:10px; padding:10px; border-radius:10px; }
</style>
</head>

<body>

<h2>🚕 Taxi App</h2>

<div id="menu">
<button onclick="setRole('passenger')">Пассажир</button>
<button onclick="setRole('driver')">Водитель</button>
</div>

<!-- PASSENGER -->
<div id="passenger" style="display:none;">
<h3>Заказ такси</h3>
<input id="from" placeholder="Откуда">
<input id="to" placeholder="Куда">
<button onclick="createOrder()">Найти машину</button>
</div>

<!-- DRIVER -->
<div id="driver" style="display:none;">
<h3>Заявки</h3>
<div id="orders"></div>
</div>

<script>
// 🔥 FIREBASE CONFIG (ТВОИ ДАННЫЕ)
const firebaseConfig = {
  apiKey: "AIzaSyD48x9Cqg88dzY0udAkbMsxblhZyhxG-f4",
  authDomain: "taxi-app-158f3.firebaseapp.com",
  databaseURL: "https://taxi-app-158f3-default-rtdb.firebaseio.com",
  projectId: "taxi-app-158f3",
  storageBucket: "taxi-app-158f3.appspot.com",
  messagingSenderId: "150352653529",
  appId: "1:150352653529:web:2dd6d85b5219b8807962c8"
};

// INIT FIREBASE
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let role = "";
let cooldown = false;

// 👤 VK ID (заглушка)
function getVKID(){
  return "vk_" + Math.floor(Math.random()*999999);
}

// переключение роли
function setRole(r){
  role = r;

  document.getElementById("menu").style.display="none";
  document.getElementById("passenger").style.display="none";
  document.getElementById("driver").style.display="none";
  document.getElementById(r).style.display="block";

  if(r==="driver"){
    loadOrders();
  }
}

// 🚕 создать заказ
function createOrder(){
  const from = document.getElementById("from").value;
  const to = document.getElementById("to").value;

  if(!from || !to){
    alert("Заполни поля");
    return;
  }

  const id = Date.now();

  db.ref("orders/"+id).set({
    from: from,
    to: to,
    status: "new",
    passenger: getVKID(),
    driver: null
  });

  alert("🚕 Заявка создана!");
}

// 📡 загрузка заказов
function loadOrders(){
  db.ref("orders").on("value", snapshot=>{
    const data = snapshot.val();
    const container = document.getElementById("orders");

    container.innerHTML="";

    for(let id in data){
      const o = data[id];

      if(o.status === "new"){
        container.innerHTML += `
          <div class="card">
            <b>${o.from}</b> → <b>${o.to}</b><br>
            <small>Пассажир: ${o.passenger}</small><br><br>

            <button onclick="acceptOrder('${id}')">
              ✅ Принять
            </button>
          </div>
        `;
      }

      if(o.status === "taken"){
        container.innerHTML += `
          <div class="card" style="opacity:0.5">
            🚕 Уже взят
          </div>
        `;
      }
    }
  });
}

// 🚕 принять заказ
function acceptOrder(id){

  if(cooldown){
    alert("⏳ Подожди 2 минуты");
    return;
  }

  db.ref("orders/"+id).once("value").then(snap=>{
    const o = snap.val();

    if(o.status === "taken"){
      alert("❌ Уже взят другим водителем");
      return;
    }

    db.ref("orders/"+id).update({
      status: "taken",
      driver: getVKID()
    });

    alert(
      "🚕 Заказ принят!\n\n" +
      "От: " + o.from + "\n" +
      "До: " + o.to + "\n" +
      "Пассажир: " + o.passenger
    );

    cooldown = true;

    setTimeout(()=>{
      cooldown = false;
      alert("🟢 Можно брать новый заказ");
    }, 120000);

  });

}

</script>

</body>
</html>
